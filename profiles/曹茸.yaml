# 行业监控
industries:
  - name: 护肤美妆
    keywords:
      - "PMPM 芭妮兰 毕生之研 新品发布"
      - "功效护肤 成分党 品牌升级"
      - "护肤品 融资 亿元"
      - "国产护肤 代言人 官宣 营销"
    analysis_perspective: |
      国产新锐护肤品牌正处于功效护肤细分赛道竞争期，PMPM、毕生之研如何通过成分差异化建立心智？
      护肤品新品牌何时需要分众这样的线下媒体破圈？投放逻辑是什么？
      韩国品牌芭妮兰在中国市场的本土化营销策略有何特点？

  - name: 保健品
    keywords:
      - "金凯撒 Swisse 汤臣倍健 新品发布"
      - "鱼油 深海鱼油 保健品 融资"
      - "营养品 代言人 品牌升级"
      - "保健品 营销 破圈 亿元融资"
    analysis_perspective: |
      保健品行业正从B端送礼向C端自用转型，分众的白领场景是否是最优触达路径？
      鱼油赛道的竞争格局如何？金凯撒与Swisse等国际品牌的投放策略有何差异？
      保健品品牌融资金额与营销预算的典型关系是什么？

  - name: 户外服装
    keywords:
      - "日志 波司登 探路者 羽绒服 新品发布"
      - "户外服装 融资 亿元 品牌升级"
      - "鹅绒服 保暖 代言人 营销"
      - "国产户外品牌 破圈 市场动作"
    analysis_perspective: |
      户外服装正从小众专业向大众日常渗透，分众的写字楼场景能否有效触达白领户外爱好者？
      国产户外品牌与国际品牌（始祖鸟、北面）的营销策略差异在哪里？
      日志鹅绒服如何在波司登主导的市场中建立差异化认知？

# 融资专项监控
fundraising:
  tracks:
    - name: 护肤美妆
      priority: 8
      reason: "功效护肤赛道持续火热，融资后品牌有强烈的大众破圈需求"
      focus_signal: "融资金额超5000万、资方背景强（红杉/高瓴/腾讯等）、宣布品牌升级"

    - name: 保健品
      priority: 7
      reason: "保健品C端化趋势明显，分众白领场景匹配度高"
      focus_signal: "融资金额大、换代言人、宣布品牌升级或大规模市场投放"

    - name: 户外服装
      priority: 6
      reason: "户外赛道持续增长，国产品牌有破圈需求"
      focus_signal: "融资金额大、新品发布在即、代言人官宣"
