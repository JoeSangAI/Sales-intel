# 行业监控（低频宽搜，每周一、四）
# 关键词聚焦商机信号：融资、发布会、品牌升级、大事件
industries:
  - name: 3C数码
    keywords:
      - "小米 OPPO 荣耀 vivo 新品发布"
      - "华为 手机 发布会 上市"
      - "消费电子 融资 亿元"
      - "耳机 平板 智能手表 代言人"
    # 分析框架：描述这个行业的分众机会分析角度
    analysis_perspective: |
      这个行业的市场竞争格局是什么？头部品牌的投放策略有何差异？
      新品发布的节奏是怎样的？代言人策略对品牌破圈有什么价值？
      分众在这个行业的机会在哪里？什么时机介入最合适？

  - name: 新能源汽车
    keywords:
      - "小鹏 蔚来 理想 问界 发布会 上市"
      - "吉利 长安 奇瑞 新车 发布"
      - "新能源汽车 融资 亿元"
      - "汽车 代言人 官宣 营销"
    analysis_perspective: |
      新能源汽车正处于品牌心智争夺战关键期，特斯拉、比亚迪、蔚小理格局如何演化？
      新车发布节奏密集，哪些节点是分众介入黄金期？
      补贴政策退坡后，品牌如何靠差异化维持增长？分众能帮品牌做什么？

  - name: AI科技
    keywords:
      - "DeepSeek 百度 腾讯 字节 大模型 发布"
      - "AI独角兽 融资 亿元"
      - "人工智能 品牌 营销 广告"
      - "Kimi 豆包 文心 商业化 发布"
    analysis_perspective: |
      AI大模型赛道正从技术竞争转向营销竞争，融资后品牌为何必须打广告？
      C端AI产品的用户获取逻辑是什么？分众如何帮AI品牌触达白领决策链？
      什么阶段的AI品牌最有可能选择分众？合作模式可以是什么样的？

  - name: 机器人与具身智能
    keywords:
      - "宇树 智元 傅利叶 人形机器人 融资 亿元"
      - "具身智能 机器人 发布 商业化"
      - "人形机器人 代言 营销 破圈"
      - "机器人 品牌升级 市场动作"
    analysis_perspective: |
      机器人品牌当前处于从极客圈向大众市场破圈的关键节点，分众的封闭空间高频触达是否是最优破圈路径？
      资方背景（红杉、高瓴等）如何影响品牌的营销预算决策？
      对标大疆早期破圈路径，机器人的分众打法可以参照什么模式？

  - name: 智能硬件与IoT
    keywords:
      - "智能硬件 融资 亿元 2026"
      - "IoT 物联网 新品 发布 融资"
      - "可穿戴设备 新品 代言人 品牌升级"
      - "智能家居 品牌 营销 破圈"
    analysis_perspective: |
      智能硬件正处于新品类建立认知的窗口期，分众的写字楼+社区双场景覆盖能否帮助品牌完成从极客到大众的跨越？
      融资后品牌的市场推广策略通常是怎样的？分众在其中的位置是什么？

  - name: 半导体与集成电路
    keywords:
      - "半导体 融资 亿元 IPO 2026"
      - "芯片 企业 品牌升级 市场动作"
      - "集成电路 品牌 营销 破圈"
    analysis_perspective: |
      半导体品牌的消费者业务（B2C）是否需要分众这样的C端媒体？哪些半导体公司有消费者产品线需要打品牌？
      政策利好背景下，半导体品牌的营销策略是否会从B端渠道转向C端心智占领？
      【注意】排除纯B端芯片设计公司，聚焦有消费者品牌需求的半导体企业

  - name: 企业服务与SaaS
    keywords:
      - "SaaS 融资 亿元 品牌升级 2026"
      - "企业服务 品牌 营销 破圈"
      - "toB toC 企业服务 品牌建设"
      - "企服公司 代言人 发布会"
    analysis_perspective: |
      企业服务公司何时需要打C端品牌？当产品从B端走向B+C混合时，分众是否成为必经之路？
      SaaS公司的典型营销路径是什么？分众在其中的独特价值在哪里？
      哪些阶段的企服公司最可能选择分众？

# 融资专项监控（每周一、四运行）
# 聚焦融资后有品牌推广需求的科技赛道
fundraising:
  # 搜集窗口说明：
  #   周一推送 → 覆盖上周四至周一的融资动态
  #   周四推送 → 覆盖周一至周四的融资动态
  # 融资赛道配置
  stages:
    - seed: "种子/天使轮 - 观察期，3个月后跟进"
    - series_a: "A轮 - 产品跑通，快速扩张，立即接触"
    - series_b: "B轮 - 规模化，预算释放，抢大单"
    - series_c: "C轮及以上 - 有钱任性，广告凶猛"

  # 赛道权重：和营销越近、越需要打C端品牌的赛道，分众机会越大
  tracks:
    - name: AI大模型
      priority: 9
      reason: "C端产品需要快速建立大众认知，融资金额大，营销预算充足"
      focus_signal: "融资金额超10亿、资方背景强（红杉/高瓴/腾讯等）"

    - name: 机器人/具身智能
      priority: 8
      reason: "商业化窗口期，品类教育需求强，分众破圈逻辑清晰"
      focus_signal: "量产消息、资方背景强、有消费者产品线"

    - name: 智能硬件/IoT
      priority: 7
      reason: "新品+融资双信号，推广需求强，分众场景匹配度高"
      focus_signal: "融资金额大、新品发布在即、有明确C端产品"

    - name: 企业服务/SaaS
      priority: 6
      reason: "当toB开始做toC时，分众是快速建立大众认知的稀缺渠道"
      focus_signal: "宣布做C端产品、换品牌slogan、代言人"

    - name: 半导体
      priority: 4
      reason: "排除纯B端，聚焦有消费者产品线的半导体企业"
      focus_signal: "消费级芯片新品发布、品牌升级动作"

  # 排除赛道（和营销关联弱）
  excluded_tracks:
    - "出行/共享出行"
    - "物流/同城配送"
    - "教育培训"
    - "医疗健康（纯B端）"
    - "游戏（政策风险高）"

